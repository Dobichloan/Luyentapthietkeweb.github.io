<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Personal's Information</h1>
    <form onsubmit="return validateForm()">
    <!--  onsubmit="return validateForm()": chạy kiểm tra trước khi gửi, kiểm tra các điều kiện -->
        <label for="name">
            Full Name:
            <input type="text" name="full name" id="name" placeholder="Fill your name" required>
        </label>
        <br>
        <br>
        <label for="">
            Email:
            <input type="email" name="email" id="email" placeholder="Fill your email" required>
        </label>
        <br>
        <br>
        <label for="">
            Subsription type: 
            <input type="button" value="monthly">
            <input type="button" value="yearly">
        </label>
        <br>
        <br>
        <label for="">
            My hobby:
            <input type="checkbox" name="checkbox" id="reading">reading
            <input type="checkbox" name="checkbox" id="booking">booking
            <input type="checkbox" name="checkbox" id="watching">watching
        </label>
        <br>
        <br>
        <label for="Ngôn ngữ">
            Ngôn ngữ lập trình
        </label>
        <select name="Ngôn ngữ lập trình" id="Ngôn ngữ" required>
            <option value="R">R</option>
            <option value="C++">C++</option>
            <option value="Python">Python</option>
        </select>
        <br>
        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        <p id="successMessage" style="display: none; color: green;">✅ The information is sent successfully!</p>
  </form>
    <script>
        function validateForm() {
            let a = document.getElementById("name").value;
            let b = document.getElementById("email").value;
            let message = document.getElementById("successMessage");
        if (name === "" || email === "" || message === "") {
            alert("Please, fill enough your information");
            return false;
        }     
        alert("Send successfuly")
        return true;
    }
    </script>
</body>
</html>
<!-- Sự khác nhau giữa alert và return: 
 alert: gửi và hiển thị thông báo
 return: trả về giá trị từ 1 hàm -->
