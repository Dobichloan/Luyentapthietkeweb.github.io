<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- CSS cho menu -->
 <style>
    nav{
        background-color: black;
        padding: 30px;
        height: 30px ;
        text-align: center;
    }
    nav a{
        font-size: 25px;
        text-decoration: none;
        font-weight:400;
        color: aliceblue;
        margin: 0 10px;
        /* margin: tạo khoảng cách cho tất cả các cạnh */
    }
    nav a:hover{ 
        color: aquamarine;
        /* hover: di chuột chuột đến liên hết sẽ đổi màu chữ */
    }
    button{
        padding: 10px;
        font-size: 15px;
    }
    /* CSS cơ bản cho bảng */
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }
        th, td { 
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        /* cụm th,td: selector */
        /* dấu ',': chọn cả 2 */
        /* cặp {}: chứa các thuộc tính và giá trị */
        tr:hover {
            background-color: #f5f5f5;
        }
        /* Form cơ bản */
        .form-container {
            width: 60%;
            margin: 20px auto;
            padding: 20px;
            /* Khoảng cách giữa nội dung và viền */
            border: 1px solid #ccc;
            /* khoảng cách giữa các phần tử trong ô */
        }
        /* dấu '.': dùng chọn class */
        input[type="text"], 
        input[type="email"], 
        textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
        
 </style>
<body>
<!-- menu điều hướng -->
    <nav id="menu">
        <a href="Trang chủ">Trang chủ</a>
        <a href="Sách">Sách</a>
        <a href="Tác giả">Tác giả</a>
        <a href="Liên hệ">Liên hệ</a>
    </nav>
    <br><br>
    <button onclick="toggleMenu">Ẩn/Hiện Menu</button>
    <br><br>
<!-- tạo bảng -->
    <header style="font-size: 25px;">Bảng linh kiện máy tính</header>
    <br>
    <table id="table">
        <tr>
            <th rowspan="2">Tên linh kiện</th> 
            <th colspan="2">Nội dung</th>
        </tr>
        <tr>
            <th>Giá (VND)</th>
            <th> Đánh giá</th>
        </tr>
        <tr>
            <td>CPU Intel Core i5</td>
            <td>5.000.000</td>
            <td>4.5/5.0</td>           
        </tr>
        <tr>
            <td>RAM DDR4 8GB</td>
            <td>800.000</td>
            <td>4.0/5.0</td>
        </tr>
        <tr>
            <td>Ổ cứng SSD</td>
            <td>1.200.000</td>
            <td>4.8/5.0</td>
        </tr>
    </table>
    <br>
    <button onclick="changeColor()">Đổi màu chữ</button>
    <button onclick="sortTable()">Sắp xếp theo giá</button>
    <!-- FORM -->
    <div class="form-container">
        <h2>Biểu mẫu liên hệ</h2>
        <form onsubmit="return validateForm()">
            <label>Họ tên:</label><br><br>
            <input type="text" name="name" id="name" placeholder="Fill your name">
            <br> <br>
            <label>Email:</label> <br> <br>
            <input type="email" name="email" id="email" placeholder="Fill your email">
            <br><br>
            <label>Tin nhắn</label><br><br>
            <input type="text" name="message" id="message"><br><br>
            <input type="submit" value="Gửi">
        </form>
    </div>
    <script>
        //jave của table

        let isRed = false // khai báo biến kiểu boolean
        function changeColor(){ // định nghĩa ham
            const color = document.getElementById('table');
            // get...: hàm của document dùng để tìm và lấy phần tử HTML theo ID
            table.style.color = isRed ? "Blue" : "Red";
            // thay đổi màu: nếu isRed = T -> blue
            // dâu".": nối chuỗi của các thuộc tính
            isRed = !isRed; // đao chiều
        }
        function sortTable(){
            const table = document.getElementById('table');
            const rows = Array.from(table.rows).slice(1);
            //lấy hàng ngang, chuyển mảng (array.from()), bỏ các th, tr bằng slice(1)
            rows.sort((a,b) => { // sắp xếp các mảng và có sẵn vòng lặp, a,b: so sánh
                const priceA = parseInt(a.cells[1].innerText);
                //a.cell[..]: lấy cột thứ mấy
                // .innerText: lấy nội dung văn bản
                // parse(..): chuyển từ chuỗi sang số
                const priceB = parseInt(b.cells[1].innerText);
                return priceA - priceB; // sắp xếp tăng dần
                // priceB - priceA: giảm dần
            });
                rows.forEach(row => table.appendChild(row));
                // forEach: gắp lại các giá trị vào bảng
                // appendChild(): di chuyển dòng đó xuống cuối bảng
        }
         function toggleMenu() {
            const nav = document.getElementById("mainNav"); 
            nav.style.display = nav.style.display === "none" ? "block" : "none"; //gán gtri cho thuộc tính CSS của 1 phần tử trong html
        }
       
        //jave cho form
       function validateForm() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            if (name === "" || email === "" || message === ""){
                alert("Vui lòng điền đầy đủ thông tin ");
                return false;
            }
            if (name.length < 3){
                alert("Vui lòng điền ít nhất 3 kí tự");
                return false;
            }
            alert("Gửi thành công");
            return true;
        }
    </script>
</body>
